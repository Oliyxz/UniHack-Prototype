<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSense AI - Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <script src="nav.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .settings-panel {
            padding: 30px;
            max-width: 600px;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-glass);
        }
        .setting-info h4 {
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 16px;
        }
        .setting-info p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* Toggle Switch CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid var(--border-glass);
        }
        .slider:before {
            position: absolute; content: "";
            height: 20px; width: 20px; left: 3px; bottom: 3px;
            background-color: var(--text-primary);
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(22px); background-color: #fff; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <i data-lucide="droplet" class="brand-icon"></i>
                <h1>AquaSense <span class="accent">AI</span></h1>
            </div>
            <nav><!-- injected by nav.js --></nav>
            <div class="system-status">
                <div class="status-indicator pulse-green"></div>
                <span>System Online</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-titles">
                    <h2>Platform Settings</h2>
                    <p>Customize your AquaSense AI experience</p>
                </div>
                <div class="header-actions">
                    <div class="user-profile"></div>
                </div>
            </header>

            <div class="dashboard-grid">
                <div class="glass-panel settings-panel">
                    <div class="section-title" style="margin-bottom: 10px;">
                        <h3>Appearance & Theming</h3>
                    </div>
                    
                    <div class="setting-row">
                        <div class="setting-info">
                            <h4>Light Mode</h4>
                            <p>Switch the platform theme to a brighter clinical palette.</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="theme-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    
                </div>
            </div>
        </main>
    </div>

    <script src="settings.js"></script>
    <script>
        lucide.createIcons();
    </script>
<script src="agent.js" defer></script>
</body>
</html>
